{% extends "base.html" %}

{% block title %}SDCodex - Saved Gallery{% endblock %}

{% block styles %}
<style>
    .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 24px;
        margin-top: 20px;
    }

    .gallery-item {
        background: var(--card-bg, #fff);
        border: 1px solid var(--border, #eee);
        border-radius: 12px;
        overflow: hidden;
        transition: transform 0.2s, box-shadow 0.2s;
        display: flex;
        flex-direction: column;
    }
    
    [data-theme="dark"] .gallery-item {
        background: #1c1c1e;
        border-color: #333;
    }

    .gallery-item:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .item-image {
        width: 100%;
        height: 200px;
        object-fit: cover;
        cursor: pointer;
    }

    .item-content {
        padding: 16px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
    }

    .item-caption {
        font-size: 14px;
        color: var(--text, #333);
        margin-bottom: 12px;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        flex-grow: 1;
    }

    [data-theme="dark"] .item-caption {
        color: #eee;
    }

    .item-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 10px;
        border-top: 1px solid var(--border, #eee);
        padding-top: 10px;
    }

    [data-theme="dark"] .item-actions {
        border-top-color: #333;
    }

    .item-date {
        font-size: 12px;
        color: var(--text-secondary, #888);
    }

    /* Modal Styles */
    .gallery-modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.85);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 2000;
        backdrop-filter: blur(5px);
    }

    .gallery-modal-content {
        background: var(--card-bg, #fff);
        width: 90%;
        max-width: 1100px;
        height: 85vh;
        border-radius: 20px;
        display: grid;
        grid-template-columns: 1fr 350px;
        overflow: hidden;
        position: relative;
    }

    [data-theme="dark"] .gallery-modal-content {
        background: #1c1c1e;
    }

    @media (max-width: 800px) {
        .gallery-modal-content {
            grid-template-columns: 1fr;
            grid-template-rows: 1fr 200px;
            height: 95vh;
        }
    }

    .modal-image-view {
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    .modal-image-view img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
    }

    .modal-info-panel {
        padding: 30px;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
    }

    .modal-close-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 40px;
        height: 40px;
        background: rgba(255,255,255,0.2);
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 2001;
        font-size: 24px;
    }

    .modal-section-title {
        font-size: 12px;
        text-transform: uppercase;
        color: var(--primary, #007bff);
        margin-top: 15px;
        margin-bottom: 5px;
        font-weight: bold;
    }

    .loading-state {
        text-align: center;
        padding: 50px;
        color: var(--text-secondary, #888);
    }
</style>
{% endblock %}

{% block content %}
<div class="container mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1>Saved Gallery</h1>
            <p style="color: var(--text-secondary)">Your persistently saved images and captions</p>
        </div>
    </div>

    <div id="gallery-container" class="gallery-grid">
        <div class="loading-state col-12" style="grid-column: 1 / -1;">
            Loading saved images...
        </div>
    </div>
</div>

<!-- Detailed Modal -->
<div id="detail-modal" class="gallery-modal">
    <div class="modal-close-btn" onclick="closeDetailModal()">×</div>
    <div class="gallery-modal-content">
        <div class="modal-image-view">
            <img id="detail-img" src="" alt="Full view">
        </div>
        <div class="modal-info-panel">
            <h5 id="detail-filename" style="word-break: break-all; margin-bottom: 20px;">Filename</h5>
            
            <div class="modal-section-title">Caption</div>
            <div id="detail-caption" style="font-size: 15px; margin-bottom: 15px; white-space: pre-wrap;"></div>
            
            <div class="modal-section-title">SD Prompt</div>
            <div id="detail-sd-prompt" style="font-size: 13px; font-style: italic; margin-bottom: 15px;"></div>
            
            <div class="modal-section-title">SD Negative Prompt</div>
            <div id="detail-sd-negative" style="font-size: 13px; font-style: italic; margin-bottom: 15px;"></div>
            
            <div class="modal-section-title">Generation Info</div>
            <div id="detail-sd-setting" style="font-size: 12px; font-family: monospace; white-space: pre-wrap; margin-bottom: 20px;"></div>
            
            <button id="detail-delete-btn" class="btn btn-danger mt-auto">Delete from Gallery</button>
        </div>
    </div>
</div>

<script>
    let savedImages = [];
    let currentDetailedImageId = null;

    async function loadSavedGallery() {
        const container = document.getElementById('gallery-container');
        try {
            const response = await fetch('/api/gallery/saved');
            const data = await response.json();
            
            if (!response.ok) throw new Error(data.error || 'Failed to load');
            
            savedImages = data.images || [];
            
            if (savedImages.length === 0) {
                container.innerHTML = '<div class="loading-state col-12" style="grid-column: 1 / -1;">No images saved yet. Go to Captioning to save some!</div>';
                return;
            }
            
            container.innerHTML = '';
            savedImages.forEach(img => {
                const date = img.created_at ? new Date(img.created_at).toLocaleDateString() : 'Unknown date';
                
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.innerHTML = `
                    <img class="item-image" src="${img.image_path}" alt="${img.file_name}" onclick="openDetailModal(${img.id})">
                    <div class="item-content">
                        <div class="item-caption">${img.caption || 'No caption'}</div>
                        <div class="item-actions">
                            <span class="item-date">${date}</span>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteImage(${img.id}, event)"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
                container.appendChild(item);
            });
            
        } catch (error) {
            container.innerHTML = `<div class="loading-state col-12" style="grid-column: 1 / -1; color: red;">Error: ${error.message}</div>`;
        }
    }

    function openDetailModal(id) {
        const img = savedImages.find(i => i.id === id);
        if (!img) return;
        
        currentDetailedImageId = id;
        document.getElementById('detail-img').src = img.image_path;
        document.getElementById('detail-filename').textContent = img.file_name;
        document.getElementById('detail-caption').textContent = img.caption || 'No caption available.';
        document.getElementById('detail-sd-prompt').textContent = img.sd_prompt || 'N/A';
        document.getElementById('detail-sd-negative').textContent = img.sd_negative || 'N/A';
        document.getElementById('detail-sd-setting').textContent = img.sd_setting || 'N/A';
        
        document.getElementById('detail-modal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeDetailModal() {
        document.getElementById('detail-modal').style.display = 'none';
        document.body.style.overflow = 'auto';
        currentDetailedImageId = null;
    }

    document.getElementById('detail-delete-btn').onclick = async () => {
        if (currentDetailedImageId && confirm('Are you sure you want to delete this image?')) {
            await deleteImage(currentDetailedImageId);
            closeDetailModal();
        }
    };

    async function deleteImage(id, event) {
        if (event) event.stopPropagation();
        else if (!confirm('Delete this saved image?')) return;
        
        try {
            const res = await fetch(`/api/gallery/saved/${id}`, { method: 'DELETE' });
            if (res.ok) {
                loadSavedGallery();
            } else {
                const data = await res.json();
                alert('Error: ' + data.error);
            }
        } catch (err) {
            alert('Error deleting image: ' + err.message);
        }
    }

    document.getElementById('detail-modal').onclick = (e) => {
        if (e.target.id === 'detail-modal') closeDetailModal();
    };

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && document.getElementById('detail-modal').style.display === 'flex') {
            closeDetailModal();
        }
    });

    // Load on init
    loadSavedGallery();
</script>
{% endblock %}
